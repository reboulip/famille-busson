{% load static %}
<div class="presence-calendar"
     data-presences='{{ presences_json|escape }}'
     data-window="short">
    <div class="presence-calendar-toolbar">
        <div class="btn-group btn-group-sm" role="group" aria-label="Navigation">
            <button type="button" class="btn btn-outline-secondary cal-prev" aria-label="Mois précédent">← Mois</button>
            <button type="button" class="btn btn-outline-secondary cal-today">Aujourd'hui</button>
            <button type="button" class="btn btn-outline-secondary cal-next" aria-label="Mois suivant">Mois →</button>
        </div>
        <div class="btn-group btn-group-sm ms-3" role="group" aria-label="Échelle">
            <button type="button" class="btn btn-outline-secondary cal-window-toggle" data-target="short">Semaines</button>
            <button type="button" class="btn btn-outline-secondary cal-window-toggle" data-target="long">Mois</button>
        </div>
        <span class="presence-calendar-range ms-3 text-muted"></span>
    </div>
    <div class="presence-calendar-scroll">
        <div class="presence-calendar-grid"></div>
    </div>
    <div class="presence-calendar-legend mt-2">
        <span class="presence-calendar-bar bar-past">passé</span>
        <span class="presence-calendar-bar bar-current">en cours</span>
        <span class="presence-calendar-bar bar-future">à venir</span>
    </div>
</div>
<script src="{% static 'js/presence_calendar.js' %}"></script>
