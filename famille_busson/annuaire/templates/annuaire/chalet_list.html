{% extends "annuaire/base.html" %}
{% load static %}
{% block content %}
    <h1>Châlets PSV</h1>

    <div class="annuaire-grid">
        {% for chalet in chalets %}
            <a href="{% url 'chalet-detail' chalet.pk %}" class="personne-card">
                {% if chalet.photo %}
                    <img src="{{ chalet.photo.url }}" alt="{{ chalet.name }}" class="personne-card-photo">
                {% else %}
                    <div class="chalet-photo-placeholder">🏔️</div>
                {% endif %}
                <div class="personne-card-info">
                    <strong>{{ chalet.name }}</strong>
                    <span>{{ chalet.address }}</span>
                </div>
            </a>
        {% empty %}
            <p>Aucun châlet enregistré.</p>
        {% endfor %}
    </div>
{% endblock content %}
