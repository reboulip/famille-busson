{% extends 'annuaire/base.html' %}
{% load static %}
{% load crispy_forms_filters %}

{% block content %}
    <h2>Connexion</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.media }}
        {{ form|crispy }}
        <button type="submit">Se connecter</button>
    </form>

    <p>Tu n'as pas encore créé ton compte ? <a href="{% url 'signup' %}">C'est par ici</a>.</p>
{% endblock %}
