{% extends "annuaire/base.html" %}
{% block content %}
    <div class="form">
        <h1>Supprimer ce commentaire ?</h1>
        <blockquote class="comment-preview">
            <strong>{{ object.author|default:"Anonyme" }}</strong> — {{ object.created_at|date:"j F Y H:i" }}
            <div>{{ object.body|linebreaks }}</div>
        </blockquote>
        <form method="POST">
            {% csrf_token %}
            <button class="btn btn-outline-danger" type="submit">Supprimer définitivement</button>
            <a href="{% url 'blogpost-detail' object.post.pk %}" class="btn btn-outline-secondary ms-2">Annuler</a>
        </form>
    </div>
{% endblock content %}
